services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # No ports: — Traefik routes traffic via the shared proxy network.
    # Exposing a host port would bypass Traefik entirely.
    env_file:
      - .env
    # volumes:
    # - ../application-logs:/application-logs  # uncomment to enable file logging
    depends_on:
      redis-server:
        condition: service_healthy
    networks:
      - backend # internal — app ↔ redis only
      - dokploy-network # required so Traefik can reach the container
    # Traefik labels are NOT needed here — Dokpoly injects them automatically
    # when you configure the domain from the dashboard.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://app:9000/health'', res => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on(''error'', () => process.exit(1));"',
        ]
      interval: 120s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: always

  redis-server:
    image: redis:7.4-alpine
    env_file:
      - .env
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--dir",
        "/data",
        "--save",
        "",
      ]
    volumes:
      - redis_data:/data
    networks:
      - backend # redis is internal only — never exposed to Traefik
    healthcheck:
      # Use REDISCLI_AUTH env var instead of -a flag so the password
      # is not visible in the process argument list (ps/top).
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

volumes:
  redis_data:

networks:
  backend:
    driver: bridge # internal — app ↔ redis only

  dokploy-network:
    external: true # pre-created by Dokpoly — Traefik uses this to route to containers
