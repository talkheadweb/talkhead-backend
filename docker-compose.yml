  redis-server:
    image: redis:7.4-alpine
    env_file:
      - .env
    command: [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",

        # ── Memory ────────────────────────────────────────────────────────
        # Cap Redis at 256 MB. When full, evict the least-recently-used keys
        # that have a TTL set (allkeys-lru would evict everything including
        # permanent keys like search indexes — avoid that).
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "volatile-lru",

        # ── Persistence (AOF) ──────────────────────────────────────────────
        # Append-only file — survives container restarts.
        # everysec = at most 1 second of data loss on crash (good balance).
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--dir",
        "/data",

        # Disable RDB snapshots (AOF is enough; RDB causes latency spikes)
        "--save",
        "",

        # ── Keyspace events ────────────────────────────────────────────────
        # E = keyevent events, x = expired events
        # Enables __keyevent@0__:expired notifications (used by RedisEventClient)
        "--notify-keyspace-events",
        "Ex",
        # ── Security ───────────────────────────────────────────────────────
        # Disable dangerous commands that could wipe or expose data
        # "--rename-command",     "FLUSHALL", "",
        # "--rename-command",     "FLUSHDB",  "",
        # "--rename-command",     "DEBUG",    "",
        # "--rename-command",     "CONFIG",   "",
      ]
    deploy:
      resources:
        limits:
          memory: 300M # hard Docker limit — slightly above Redis maxmemory
        reservations:
          memory: 64M
    volumes:
      - redis_data:/data
    networks:
      - backend # redis is internal only — never exposed to Traefik
    healthcheck:
      # Use REDISCLI_AUTH env var instead of -a flag so the password
      # is not visible in the process argument list (ps/top).
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 120s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

volumes:
  mongo_data:
  redis_data:

networks:
  backend:
    driver: bridge # internal — app ↔ redis only

  dokploy-network:
    external: true # pre-created by Dokpoly — Traefik uses this to route to containers
