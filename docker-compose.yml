services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - ../application-logs:/application-logs
    depends_on:
      redis-server:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://app:9000/health'', res => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on(''error'', () => process.exit(1));"',
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: always

  redis-server:
    image: redis:7.4-alpine
    env_file:
      - .env
    command:
      [
        "redis-server",
        "--requirepass", "${REDIS_PASSWORD}",
        "--appendonly", "yes",
        "--appendfsync", "everysec",
        "--dir", "/data",
        "--save", "",
      ]
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      # Use REDISCLI_AUTH env var instead of -a flag so the password
      # is not visible in the process argument list (ps/top).
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

volumes:
  redis_data:

networks:
  backend:
    driver: bridge
