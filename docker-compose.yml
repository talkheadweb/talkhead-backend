services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # No ports: — Traefik routes traffic via the shared proxy network.
    # Exposing a host port would bypass Traefik entirely.
    env_file:
      - .env
    # volumes:
    # - ../application-logs:/application-logs  # uncomment to enable file logging
    depends_on:
      # mongo-server:
      #   condition: service_healthy
      redis-server:
        condition: service_healthy
    networks:
      - backend # internal — app ↔ redis only
      - dokploy-network # required so Traefik can reach the container
    # Traefik labels are NOT needed here — Dokpoly injects them automatically
    # when you configure the domain from the dashboard.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://app:9000/health'', res => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on(''error'', () => process.exit(1));"',
        ]
      interval: 120s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: always

  # mongo-server:
